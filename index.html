<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Application Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --paper:#ffffff;
  --panel:#ffffff;
  --panel-alt:#ffffff;
  --ink:#000000;
  --muted:#000000;
  --warm-gray:#000000;
  --line:#000000;
  --line-soft:#000000;
  --nasa-red:#d63b31;
  --green:#1f5136;
  --red:#b53027;
  --amber:#8a5c12;
}
html,body{height:100%;}
body{
  font-family:Garamond, "Times New Roman",serif;
  background:var(--paper);
  color:var(--ink);
  line-height:1.3;
}
.mono{font-family:"Courier New",Courier,monospace;}
.topbar-eyebrow,
.topbar-title,
.tstat-l,
.sec-label,
.conf-hdr,
.srow-matter,
.sess-badge,
.card-title,
.app-mn,
.add-title,
.field label,
.add-btn,
.ooo-tog-btn,
.cal-month-lbl{
  font-family:Futura,"Futura PT","Avenir Next",sans-serif;
}
.topbar{
  border-bottom:3px solid var(--line);
  background:var(--panel);
  padding:1.25rem 1.25rem 1rem;
}
.topbar-inner{
  max-width:1280px;
  margin:0 auto;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:1.5rem;
}
.topbar-brand{
  display:flex;
  align-items:flex-end;
  gap:1rem;
  min-width:0;
}
.brand-copy{display:flex;flex-direction:column;gap:.25rem;min-width:0;}
.topbar-eyebrow{
  font-size:11px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--muted);
}
.topbar-title{
  font-size:30px;
  font-weight:700;
  line-height:1;
  letter-spacing:.02em;
}
.topbar-sub{
  font-size:14px;
  color:var(--muted);
  max-width:700px;
}
.topbar-stats{
  display:grid;
  grid-template-columns:repeat(4,minmax(90px,1fr));
  gap:.5rem;
  min-width:420px;
}
.tstat{
  border:1px solid var(--line);
  background:var(--panel);
  padding:.55rem .7rem .5rem;
  min-height:64px;
}
.tstat-l{
  display:block;
  font-size:10px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--muted);
}
.tstat-v{
  display:block;
  margin-top:.25rem;
  font-size:17px;
  font-weight:700;
}
.tstat-v.alarm{color:var(--nasa-red);}
.wrap{
  max-width:1280px;
  margin:0 auto;
  padding:1rem 1.25rem 2rem;
  display:grid;
  grid-template-columns:minmax(0,2.1fr) minmax(300px,1fr);
  gap:1rem;
  align-items:start;
}
.col-main,.col-side{min-width:0;}
.col-side{display:flex;flex-direction:column;gap:1rem;}
.sec-label{
  margin:.95rem 0 .45rem;
  padding:.4rem 0 .2rem;
  border-top:2px solid var(--line);
  font-size:11px;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--muted);
  font-weight:700;
}
.sec-label:first-child{margin-top:0;}
.conf{
  border:2px solid var(--nasa-red);
  background:#ffffff;
  padding:.9rem 1rem;
  margin-bottom:.85rem;
}
.conf-hdr{
  font-size:12px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.1em;
  color:var(--nasa-red);
  margin-bottom:.45rem;
}
.conf-item{font-size:13px;line-height:1.55;}
.conf-mn{font-weight:700;}
.done-today-bar{
  border:1px solid var(--line);
  background:var(--panel-alt);
  padding:.8rem 1rem;
  margin-bottom:.75rem;
}
.done-today-item{display:flex;justify-content:space-between;align-items:center;gap:1rem;}
.done-today-item + .done-today-item{margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--line-soft);}
.done-today-item strong{font-weight:700;}
.undo-btn{
  border:1px solid var(--line);
  background:var(--panel);
  color:var(--ink);
  padding:.28rem .7rem;
  font-size:11px;
  cursor:pointer;
}
.undo-btn:hover{background:var(--panel-alt);}
.srow{
  display:grid;
  grid-template-columns:150px 118px minmax(0,1fr) 62px;
  align-items:stretch;
  border:1px solid var(--line);
  border-top:none;
  background:var(--panel);
}
.srow:first-of-type{border-top:1px solid var(--line);}
.srow.today-row{border-left:6px solid var(--nasa-red);}
.srow.past-row{background:#ffffff;color:#000000;}
.srow.done-row{cursor:pointer;}
.srow.done-row:hover{background:#ffffff;}
.srow.late-row{background:#ffffff;}
.srow-date,.srow-matter,.srow-sess,.chk-wrap{padding:.78rem .8rem;}
.srow-date,.srow-matter,.srow-sess{border-right:1px solid var(--line-soft);}
.srow-date-main{font-size:12px;}
.srow-date-main.ist{font-weight:700;color:var(--nasa-red);}
.today-chip{
  display:inline-block;
  margin-top:.35rem;
  border:1px solid var(--nasa-red);
  color:var(--nasa-red);
  padding:1px 6px;
  font-size:9px;
  letter-spacing:.12em;
  text-transform:uppercase;
  font-weight:700;
}
.srow-matter{font-size:13px;font-weight:700;}
.srow-sess{display:flex;align-items:center;gap:.75rem;min-width:0;}
.sess-badge{
  display:inline-flex;
  align-items:center;
  padding:.28rem .55rem;
  border:1px solid var(--line);
  font-size:10px;
  letter-spacing:.08em;
  text-transform:uppercase;
  font-weight:700;
  white-space:nowrap;
}
.srow-spacer{flex:1 1 auto;min-width:.5rem;}
.srow-dl{font-size:11px;color:var(--muted);white-space:nowrap;}
.srow-dl.tight{color:var(--amber);font-weight:700;}
.srow-dl.over{color:var(--nasa-red);font-weight:700;}
.srow-hint{font-size:10px;color:var(--muted);white-space:nowrap;}
.srow-hint.reopen-hint{color:var(--nasa-red);}
.chk-wrap{display:flex;align-items:center;justify-content:center;}
.chk{
  width:25px;
  height:25px;
  border:1px solid var(--line);
  background:var(--panel);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}
.chk:hover{background:var(--panel-alt);}
.chk.checked{background:var(--ink);border-color:var(--ink);color:#fff;}
.chk.checked::after{content:'✓';font-size:14px;font-weight:700;}
.chk.disabled{opacity:.35;cursor:not-allowed;}
.chk.disabled:hover{background:var(--panel);}
.chk.missed{border-color:var(--amber);}
.chk.missed:hover{background:#ffffff;}
.empty-state{
  border:1px solid var(--line);
  background:var(--panel);
  padding:2.5rem 1rem;
  text-align:center;
  color:var(--muted);
  font-size:14px;
}
.card,.add-card{
  border:1px solid var(--line);
  background:var(--panel);
}
.card-hdr{padding:.8rem .9rem;border-bottom:1px solid var(--line-soft);display:flex;justify-content:space-between;align-items:center;}
.card-title{font-size:12px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:var(--muted);}
.app-item{padding:.85rem .9rem;border-top:1px solid var(--line-soft);}
.app-item:first-child{border-top:none;}
.app-top{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;margin-bottom:.4rem;}
.app-mn{font-size:16px;font-weight:700;}
.app-rm{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;}
.app-rm:hover{color:var(--nasa-red);}
.app-meta{font-size:11px;color:var(--muted);line-height:1.55;margin-bottom:.55rem;}
.prog-cols{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-top:.1rem;}
.prog-col{padding:.18rem .1rem .12rem;cursor:pointer;border:1px solid transparent;}
.prog-col:hover{border-color:var(--line-soft);background:var(--panel-alt);}
.prog-col-bar{height:5px;background:#000000;margin-bottom:4px;}
.prog-col-bar.done{background:var(--ink);}
.prog-col-bar.cur{background:var(--nasa-red);}
.prog-col-name{font-size:8px;text-align:center;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.prog-col-name.done{color:var(--ink);font-weight:700;}
.prog-col-name.cur{color:var(--nasa-red);font-weight:700;}
.apps-empty{padding:1.5rem .9rem;text-align:center;color:var(--muted);font-size:13px;}
.add-card{padding:.95rem;}
.add-title{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem;}
.field{margin-bottom:.7rem;}
.field label{display:block;margin-bottom:.25rem;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.field input{
  width:100%;
  border:1px solid var(--line);
  background:#fff;
  color:var(--ink);
  padding:.55rem .6rem;
  font-size:13px;
  outline:none;
}
.field input:focus{border-color:var(--nasa-red);}
.field input::placeholder{color:#9a978d;}
.add-btn{
  width:100%;
  border:1px solid var(--line);
  background:var(--ink);
  color:#fff;
  padding:.62rem .7rem;
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
  font-weight:700;
  cursor:pointer;
}
.add-btn:hover:not(:disabled){background:var(--nasa-red);border-color:var(--nasa-red);}
.add-btn:disabled{opacity:.35;cursor:default;}
.ooo-tog-btn{
  width:100%;
  background:var(--panel);
  border:none;
  border-bottom:1px solid var(--line-soft);
  padding:.8rem .9rem;
  text-align:left;
  font-size:12px;
  letter-spacing:.12em;
  text-transform:uppercase;
  font-weight:700;
  color:var(--ink);
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
}
.ooo-tog-btn:hover{background:var(--panel-alt);}
.ooo-inner{padding:.75rem .8rem .85rem;}
.cal-nav-row{display:flex;justify-content:space-between;align-items:center;padding-bottom:.45rem;}
.cal-nav{background:none;border:none;color:var(--ink);font-size:22px;cursor:pointer;line-height:1;padding:0 .2rem;}
.cal-month-lbl{font-size:14px;font-weight:700;}
.cal-hint{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.45rem;}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px;}
.cal-dow-row span{text-align:center;font-size:10px;color:var(--muted);}
.cal-dow-row span.wknd{color:#aaa79c;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-cell{text-align:center;font-size:11px;padding:.36rem .12rem;border:1px solid transparent;color:#aaa79c;min-height:31px;display:flex;align-items:center;justify-content:center;}
.cal-cell.wt{cursor:pointer;color:var(--ink);}
.cal-cell.wt:hover{background:var(--panel-alt);border-color:var(--line-soft);}
.cal-cell.is-ooo{background:#f6e7e5;color:var(--nasa-red);border-color:#e6b8b3;cursor:pointer;}
.cal-cell.is-booked{background:#ecebe6;color:var(--ink);border-color:var(--line-soft);}
.cal-cell.is-today-cell{border-color:var(--line);font-weight:700;}
.cal-legend{display:flex;gap:12px;margin-top:.6rem;font-size:10px;color:var(--muted);}
.leg-dot{display:inline-block;width:8px;height:8px;margin-right:3px;vertical-align:middle;border:1px solid var(--line-soft);}
.ooo-footer{display:flex;justify-content:space-between;align-items:center;margin-top:.55rem;font-size:10px;color:var(--muted);}
.clr-btn{background:none;border:none;color:var(--muted);font-size:10px;cursor:pointer;}
.clr-btn:hover{color:var(--nasa-red);}
.footer-note{
  max-width:1280px;
  margin:0 auto 1.4rem;
  padding:0 1.25rem;
  font-size:11px;
  color:var(--muted);
}
@media(max-width:1050px){
  .topbar-inner{flex-direction:column;align-items:flex-start;}
  .topbar-stats{min-width:0;width:100%;grid-template-columns:repeat(2,minmax(0,1fr));}
  .wrap{grid-template-columns:1fr;}
}
@media(max-width:720px){
  .topbar{padding:1rem;}
  .topbar-brand{flex-direction:column;align-items:flex-start;gap:.75rem;}
  .topbar-title{font-size:22px;}
  .wrap{padding:1rem;}
  .srow{grid-template-columns:1fr;}
  .srow-date,.srow-matter,.srow-sess{border-right:none;border-bottom:1px solid var(--line-soft);}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="topbar-brand">
      <div class="brand-copy">
        <span class="topbar-title">Application Schedule</span>
      </div>
    </div>
    <div class="topbar-stats">
      <div class="tstat"><span class="tstat-l">Date</span><span id="hdr-date" class="tstat-v mono" style="font-size:13px"></span></div>
      <div class="tstat"><span class="tstat-l">Applications</span><span id="hdr-apps" class="tstat-v">0</span></div>
      <div class="tstat"><span class="tstat-l">Sessions Left</span><span id="hdr-left" class="tstat-v">0</span></div>
      <div class="tstat"><span class="tstat-l">At Risk</span><span id="hdr-oob" class="tstat-v">0</span></div>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="col-main">
    <div id="conf-wrap"></div>
    <div id="done-today-wrap"></div>
    <div id="schedule"></div>
  </div>
  <div class="col-side">
    <div>
      <div class="sec-label" style="margin-top:0">Application List</div>
      <div class="card" id="apps-card"></div>
    </div>
    <div class="add-card">
      <div class="add-title">Register Application</div>
      <div class="field"><label>Matter Number</label><input type="text" id="inp-m" class="mono" placeholder="1234-123" maxlength="24" oninput="renderAll()" onkeydown="if(event.key==='Enter')addApp()"></div>
      <div class="field"><label>Call Day</label><input type="date" id="inp-c" oninput="renderAll()"></div>
      <div class="field"><label>Deadline</label><input type="date" id="inp-d" oninput="renderAll()"></div>
      <button class="add-btn" id="add-btn" onclick="addApp()" disabled>Add to Manifest</button>
    </div>
    <div class="card">
      <button class="ooo-tog-btn" onclick="toggleOoo()">
        Calendar
        <span id="ooo-tog-lbl" style="font-size:10px;color:var(--muted);font-family:'Courier New',monospace">▼ show</span>
      </button>
      <div id="ooo-body" style="display:none">
        <div class="ooo-inner">
          <div class="cal-nav-row">
            <button class="cal-nav" onclick="prevMo()">&#8249;</button>
            <span id="cal-lbl" class="cal-month-lbl"></span>
            <button class="cal-nav" onclick="nextMo()">&#8250;</button>
          </div>
          <div class="cal-hint">Click Mon–Thu to toggle OOO</div>
          <div class="cal-dow-row">
            <span>M</span><span>T</span><span>W</span><span>T</span>
            <span class="wknd">F</span><span class="wknd">S</span><span class="wknd">S</span>
          </div>
          <div id="cal-grid" class="cal-grid"></div>
          <div class="cal-legend">
            <span><span class="leg-dot" style="background:#ecebe6"></span>Scheduled</span>
            <span><span class="leg-dot" style="background:#f6e7e5;border-color:#e6b8b3"></span>OOO</span>
          </div>
          <div class="ooo-footer">
            <span id="ooo-ct"></span>
            <button id="clr-ooo-btn" class="clr-btn" onclick="clrOoo()" style="display:none">Clear all</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ── Constants ─────────────────────────────────────────────── */
const SESSIONS=['Claims','Drawings','Write','First Edit','Second Edit','Proof'];
const SESS_S  =['Clms','Draw','Write','1st Ed','2nd Ed','Proof'];
const S_CLR   =['#111111','#111111','#111111','#111111','#111111','#111111'];
const S_BG    =['#f7f7f4','#f3f2ed','#efeee8','#f2efea','#f5efec','#eef0e8'];

/* ── Utils ──────────────────────────────────────────────────── */
const pad=n=>String(n).padStart(2,'0');
const toStr=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const fromStr=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);};
const TODAY=toStr(new Date());
const isWT=s=>{const dw=fromStr(s).getDay();return dw>=1&&dw<=4;};
const nextDay=s=>{const d=fromStr(s);d.setDate(d.getDate()+1);return toStr(d);};
const daysBetween=(a,b)=>Math.round((fromStr(b)-fromStr(a))/86400000);
const fmtRow=s=>fromStr(s).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
const fmtShort=s=>fromStr(s).toLocaleDateString('en-US',{month:'short',day:'numeric'});

/* ── State ──────────────────────────────────────────────────── */
let apps=JSON.parse(localStorage.getItem('pw4_apps')||'[]');
let clog=JSON.parse(localStorage.getItem('pw4_clog')||'{}');
// clog[appId] = array of {sessIdx, date} objects
let ooo=new Set(JSON.parse(localStorage.getItem('pw4_ooo')||'[]'));
let _id=parseInt(localStorage.getItem('pw4_id')||'0');
let calMo={y:new Date().getFullYear(),m:new Date().getMonth()};
let oooOpen=false;

const uid=()=>{_id++;localStorage.setItem('pw4_id',String(_id));return `a${_id}`;};
const save=()=>{
  localStorage.setItem('pw4_apps',JSON.stringify(apps));
  localStorage.setItem('pw4_clog',JSON.stringify(clog));
  localStorage.setItem('pw4_ooo',JSON.stringify([...ooo]));
};

/* ── Helpers ──────────────────────────────────────────────── */
const doneCt=id=>(clog[id]||[]).length;
const doneSet=id=>new Set((clog[id]||[]).map(e=>e.sessIdx));
const nextPending=id=>{
  const s=doneSet(id);
  for(let i=0;i<SESSIONS.length;i++)if(!s.has(i))return i;
  return SESSIONS.length;
};
const todayEntries=()=>{
  const out=[];
  for(const a of apps){
    (clog[a.id]||[]).forEach(e=>{if(e.date===TODAY)out.push({app:a,entry:e});});
  }
  return out;
};

/* ── Scheduler ─────────────────────────────────────────────── */
function buildSchedule(startFrom){
  const queue=apps.map(a=>{
    const s=doneSet(a.id);
    const rem=[];
    for(let i=0;i<SESSIONS.length;i++)if(!s.has(i))rem.push({name:SESSIONS[i],idx:i});
    return{...a,nextIdx:rem.length?rem[0].idx:SESSIONS.length,rem};
  }).filter(q=>q.rem.length>0);

  const sched=[];
  let cur=startFrom,g=0;
  while(queue.some(q=>q.rem.length>0)&&g++<900){
    if(!isWT(cur)||ooo.has(cur)){cur=nextDay(cur);continue;}
    const elig=queue
      .filter(q=>q.rem.length>0&&q.callDay<cur)
      .sort((a,b)=>a.deadline.localeCompare(b.deadline));
    if(elig.length>0){
      const top=elig[0],sess=top.rem.shift();
      sched.push({date:cur,appId:top.id,matter:top.matter,session:sess.name,sessIdx:sess.idx,deadline:top.deadline,onTime:cur<=top.deadline,isNext:sess.idx===top.nextIdx});
    }
    cur=nextDay(cur);
  }
  return sched;
}

/* ── Actions ────────────────────────────────────────────────── */
function markDone(appId,sessIdx){
  if(sessIdx===undefined)sessIdx=nextPending(appId);
  if(sessIdx<0||sessIdx>=SESSIONS.length)return;
  if(!clog[appId])clog[appId]=[];
  if(clog[appId].some(e=>e.sessIdx===sessIdx))return;
  clog[appId].push({sessIdx,date:TODAY});
  save();renderAll();
}

function undoEntry(appId,sessIdx){
  clog[appId]=(clog[appId]||[]).filter(e=>!(e.sessIdx===sessIdx&&e.date===TODAY));
  save();renderAll();
}

function reopenSess(appId,sessIdx){
  const app=apps.find(a=>a.id===appId);
  if(!confirm(`Reopen "${SESSIONS[sessIdx]}" for ${app?.matter}?`))return;
  clog[appId]=(clog[appId]||[]).filter(e=>e.sessIdx!==sessIdx);
  save();renderAll();
}

function addApp(){
  const m=document.getElementById('inp-m').value.trim();
  const c=document.getElementById('inp-c').value;
  const d=document.getElementById('inp-d').value;
  if(!m||!c||!d)return;
  if(d<=c){alert('Deadline must be after call day.');return;}
  if(apps.find(a=>a.matter===m)&&!confirm(`Matter ${m} already exists. Add anyway?`))return;
  apps.push({id:uid(),matter:m,callDay:c,deadline:d});
  document.getElementById('inp-m').value='';
  document.getElementById('inp-c').value='';
  document.getElementById('inp-d').value='';
  save();renderAll();
}

function removeApp(id){
  if(!confirm('Remove this application and its completion history?'))return;
  apps=apps.filter(a=>a.id!==id);delete clog[id];save();renderAll();
}

function toggleOoo(){
  oooOpen=!oooOpen;
  document.getElementById('ooo-body').style.display=oooOpen?'block':'none';
  document.getElementById('ooo-tog-lbl').textContent=oooOpen?'▲ hide':'▼ show';
  if(oooOpen)renderAll();
}
function prevMo(){const d=new Date(calMo.y,calMo.m-1);calMo={y:d.getFullYear(),m:d.getMonth()};renderAll();}
function nextMo(){const d=new Date(calMo.y,calMo.m+1);calMo={y:d.getFullYear(),m:d.getMonth()};renderAll();}
function togOoo(ds){ooo.has(ds)?ooo.delete(ds):ooo.add(ds);save();renderAll();}
function clrOoo(){ooo=new Set();save();renderAll();}

/* ── Render ─────────────────────────────────────────────────── */
function renderAll(){
  const todayList=todayEntries();
  const sched=buildSchedule(TODAY);
  const bookedDates=new Set(sched.map(s=>s.date));
  const conflicts=sched.filter(s=>!s.onTime);
  const conflictMatters=[...new Set(conflicts.map(c=>c.matter))];
  const totalDone=apps.reduce((s,a)=>s+doneCt(a.id),0);
  const totalLeft=apps.length*SESSIONS.length-totalDone;

  document.getElementById('hdr-date').textContent=fmtRow(TODAY);
  document.getElementById('hdr-apps').textContent=apps.length;
  document.getElementById('hdr-left').textContent=totalLeft;
  const oobEl=document.getElementById('hdr-oob');
  oobEl.textContent=conflictMatters.length;
  oobEl.className='tstat-v'+(conflictMatters.length>0?' alarm':'');

  let confHTML='';
  if(conflictMatters.length>0){
    const byM={};
    conflicts.forEach(c=>{if(!byM[c.matter])byM[c.matter]={matter:c.matter,deadline:c.deadline,sessions:[]};byM[c.matter].sessions.push(c.session);});
    confHTML='<div class="conf"><div class="conf-hdr">&#9888; Deadline risk — '+conflictMatters.length+' application'+(conflictMatters.length!==1?'s are':' is')+' outside the available window</div>'+
      Object.values(byM).map(x=>'<div class="conf-item"><span class="conf-mn">'+x.matter+'</span> — '+x.sessions.length+' session'+(x.sessions.length!==1?'s':'')+' fall beyond <strong>'+fmtShort(x.deadline)+'</strong>: '+x.sessions.join(', ')+'.</div>').join('')+
      '</div>';
  }
  document.getElementById('conf-wrap').innerHTML=confHTML;

  let dtHTML='';
  if(todayList.length){
    dtHTML='<div class="done-today-bar">'+todayList.map(te=>
      '<div class="done-today-item"><span>Completed <strong>'+te.app.matter+'</strong> — '+SESSIONS[te.entry.sessIdx]+'</span>'+
      "<button class=\"undo-btn\" onclick=\"undoEntry('"+te.app.id+"',"+te.entry.sessIdx+")\">Undo</button></div>"
    ).join('')+'</div>';
  }
  document.getElementById('done-today-wrap').innerHTML=dtHTML;

  if(!apps.length){
    document.getElementById('schedule').innerHTML='<div class="empty-state">Register an application to generate the schedule.</div>';
    renderSide(totalDone,bookedDates);
    return;
  }

  const pastRows=[];
  for(const app of apps){
    (clog[app.id]||[]).forEach(e=>{
      pastRows.push({date:e.date,appId:app.id,matter:app.matter,session:SESSIONS[e.sessIdx],sessIdx:e.sessIdx,deadline:app.deadline,done:true});
    });
  }
  pastRows.sort((a,b)=>a.date!==b.date?a.date.localeCompare(b.date):a.sessIdx-b.sessIdx);
  const recentPast=pastRows.slice(-8);
  const futureRows=sched.slice(0,36);

  let html='';
  if(recentPast.length>0){
    html+='<div class="sec-label">Recent completions</div>';
    recentPast.forEach(row=>{
      const si=row.sessIdx;
      html+="<div class=\"srow done-row\" onclick=\"reopenSess('"+row.appId+"',"+si+")\" title=\"Click to reopen this session\">"+
        '<div class="srow-date"><div class="srow-date-main">'+fmtRow(row.date)+'</div></div>'+
        '<div class="srow-matter">'+row.matter+'</div>'+
        '<div class="srow-sess"><span class="sess-badge" style="background:'+S_BG[si]+';color:'+S_CLR[si]+'">'+row.session+'</span>'+
        '<span class="srow-spacer"></span>'+
        '<span class="srow-hint reopen-hint">↺ reopen</span></div>'+
        '<div class="chk-wrap"><div class="chk checked"></div></div>'+
        '</div>';
    });
  }

  html+='<div class="sec-label">'+(recentPast.length?'Upcoming sessions':'Sessions')+'</div>';

  if(futureRows.length===0){
    html+='<div class="empty-state" style="margin-top:4px">All sessions complete.</div>';
  } else {
    futureRows.forEach(row=>{
      const si=row.sessIdx;
      const isToday=row.date===TODAY;
      const isPast=row.date<TODAY;
      const isNext=row.isNext;
      let chkCls='chk';
      let chkClick='';
      let chkTitle='';
      if(isNext){
        chkClick="onclick=\"markDone('"+row.appId+"',"+row.sessIdx+")\"";
        chkTitle='title="Mark complete"';
      } else if(isPast){
        chkCls='chk missed';
        chkTitle='title="Earlier scheduled session for this matter still pending"';
      } else {
        chkCls='chk disabled';
        chkTitle='title="Mark out of order from the Applications list if needed"';
      }

      const dLeft=daysBetween(TODAY,row.deadline);
      const dlCls=!row.onTime?'over':dLeft<=5?'tight':'';
      const dlText=!row.onTime?fmtShort(row.deadline)+' &#9888;':'due '+fmtShort(row.deadline);
      const hintText=isNext?'<span class="srow-hint">mark done</span>':'';
      const rowCls='srow'+(isToday?' today-row':isPast?' past-row':'')+(row.onTime?'':' late-row');
      html+='<div class="'+rowCls+'">'+
        '<div class="srow-date">'+
        '<div class="srow-date-main'+(isToday?' ist':'')+'">'+fmtRow(row.date)+'</div>'+
        (isToday?'<div class="today-chip">Today</div>':'')+
        '</div>'+
        '<div class="srow-matter">'+row.matter+'</div>'+
        '<div class="srow-sess">'+
        '<span class="sess-badge" style="background:'+S_BG[si]+';color:'+S_CLR[si]+'">'+row.session+'</span>'+
        '<span class="srow-spacer"></span>'+
        hintText+
        '<span class="srow-dl '+dlCls+'">'+dlText+'</span>'+
        '</div>'+
        '<div class="chk-wrap"><div class="'+chkCls+'" '+chkClick+' '+chkTitle+'></div></div>'+
        '</div>';
    });
    if(sched.length>36)html+='<div style="text-align:center;padding:12px 0;font-size:11px;color:var(--muted)">… and '+(sched.length-36)+' more session'+(sched.length-36!==1?'s':'')+' beyond this window</div>';
  }

  document.getElementById('schedule').innerHTML=html;
  renderSide(totalDone,bookedDates);
}

function renderSide(totalDone,bookedDates){
  let appsHTML='';
  if(!apps.length){
    appsHTML='<div class="apps-empty">No applications yet.</div>';
  } else {
    appsHTML='<div class="card-hdr"><div class="card-title">Manifest</div><div class="card-title">'+apps.length+' item'+(apps.length!==1?'s':'')+'</div></div>'+ [...apps].sort((a,b)=>a.deadline.localeCompare(b.deadline)).map(a=>{
      const done=doneCt(a.id),isComplete=done>=SESSIONS.length;
      const doneS=doneSet(a.id);
      const nextP=nextPending(a.id);
      const dLeft=daysBetween(TODAY,a.deadline);
      const dlStr=isComplete?'Complete':dLeft>=0?dLeft+'d to deadline':Math.abs(dLeft)+'d overdue';
      const dlC=isComplete?'var(--green)':dLeft<0?'var(--red)':dLeft<=5?'var(--amber)':'var(--muted)';
      const progHTML=SESSIONS.map((_,i)=>{
        const isDone=doneS.has(i);
        const isCur=!isDone&&i===nextP;
        const stateCls=(isDone?' done':isCur?' cur':'');
        let click,title;
        if(isDone){
          click=" onclick=\"reopenSess('"+a.id+"',"+i+")\"";
          title=' title="Reopen '+SESSIONS[i]+'"';
        } else {
          click=" onclick=\"markDone('"+a.id+"',"+i+")\"";
          title=' title="Mark '+SESSIONS[i]+' complete"';
        }
        return '<div class="prog-col clickable'+stateCls+'"'+click+title+'>'+
          '<div class="prog-col-bar'+stateCls+'"></div>'+
          '<div class="prog-col-name'+stateCls+'">'+SESS_S[i]+'</div>'+
          '</div>';
      }).join('');
      return '<div class="app-item">'+
        "<div class=\"app-top\"><div class=\"app-mn\">"+a.matter+"</div><button class=\"app-rm\" onclick=\"removeApp('"+a.id+"')\">&times;</button></div>"+
        '<div class="app-meta">Call: '+fmtShort(a.callDay)+' &middot; Deadline: '+fmtShort(a.deadline)+'<br><span style="color:'+dlC+'">'+dlStr+'</span></div>'+
        '<div class="prog-cols">'+progHTML+'</div>'+
        '</div>';
    }).join('');
  }
  document.getElementById('apps-card').innerHTML=appsHTML;

  const m=document.getElementById('inp-m').value.trim();
  const c=document.getElementById('inp-c').value;
  const d=document.getElementById('inp-d').value;
  document.getElementById('add-btn').disabled=!(m&&c&&d);

  const togLbl=document.getElementById('ooo-tog-lbl');
  togLbl.textContent=oooOpen?'▲ hide':(ooo.size?'▼ '+ooo.size+' blocked':'▼ show');

  if(!oooOpen)return;
  const cd=new Date(calMo.y,calMo.m,1);
  document.getElementById('cal-lbl').textContent=cd.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const fw=cd.getDay(),off=fw===0?6:fw-1,dim=new Date(calMo.y,calMo.m+1,0).getDate();
  const cells=[...Array(off).fill(null),...Array.from({length:dim},(_,k)=>k+1)];
  document.getElementById('cal-grid').innerHTML=cells.map((day,i)=>{
    if(!day)return'<div></div>';
    const col=i%7,ds=toStr(new Date(calMo.y,calMo.m,day));
    const wt=col<4,iO=ooo.has(ds),iT=ds===TODAY,iB=bookedDates.has(ds)&&!iO;
    const cls=['cal-cell'];
    if(col>=4)cls.push('');
    else if(iO)cls.push('is-ooo');
    else if(iB)cls.push('is-booked');
    else if(wt)cls.push('wt');
    if(iT)cls.push('is-today-cell');
    return'<div class="'+cls.filter(Boolean).join(' ')+'" '+(wt?"onclick=\"togOoo('"+ds+"')\"":'')+'>'+day+'</div>';
  }).join('');
  document.getElementById('ooo-ct').textContent=ooo.size?ooo.size+' day'+(ooo.size!==1?'s':'')+' blocked':'No OOO days set';
  document.getElementById('clr-ooo-btn').style.display=ooo.size?'':'none';
}

renderAll();
</script>
</body>
</html>
