<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Patent Mission Procedures Console</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#111111;
  --paper:#e4d6be;
  --ply:#d2bd99;
  --surface:#f6f0e4;
  --surface-2:#efe3cf;
  --rule:#0f0f0f;
  --rule2:rgba(0,0,0,.5);
  --muted:#4a4235;
  --hint:#6a604d;
  --nasa-red:#fc3d21;
  --nasa-blue:#0b3d91;
  --ok:#2d7f3b;
  --warn:#af6a00;
  --danger:#7b0e0e;
  --tape:#252525;
}
body{
  font-family:'Oswald','Arial Narrow','Segoe UI',sans-serif;
  background:
    linear-gradient(135deg, rgba(210,189,153,.7) 0%, rgba(228,214,190,.92) 100%);
  color:var(--ink);
  min-height:100vh;
  letter-spacing:.02em;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.08;
  background-image:radial-gradient(circle at 15% 25%, #000 1px, transparent 1px),radial-gradient(circle at 75% 70%, #000 1px, transparent 1px);
  background-size:13px 13px,17px 17px;
}
.mono{font-family:'Space Mono','Courier New',monospace;}

/* ── Top bar ── */
.topbar{
  background:linear-gradient(90deg,var(--nasa-blue) 0%,#133f86 60%,#0a2f68 100%);
  border-bottom:4px solid #000;
  box-shadow:0 5px 0 rgba(0,0,0,.25);
  color:#fff;
  padding:0 1.5rem;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:20;
}
.topbar-brand{display:flex;flex-direction:column;justify-content:center;}
.topbar-eyebrow{font-size:9px;letter-spacing:4.5px;text-transform:uppercase;opacity:.9;line-height:1;font-family:'Staatliches','Oswald',sans-serif;}
.topbar-title{font-size:18px;font-weight:700;letter-spacing:.12em;line-height:1;margin-top:4px;text-transform:uppercase;font-family:'Staatliches','Oswald',sans-serif;}
.topbar-stats{display:flex;gap:1.7rem;align-items:center;}
.tstat{text-align:right;}
.tstat-l{font-size:8px;letter-spacing:2.4px;text-transform:uppercase;opacity:.8;display:block;line-height:1;}
.tstat-v{font-size:15px;font-weight:700;line-height:1;margin-top:3px;display:block;}
.tstat-v.alarm{color:#ffd1c8;}

/* ── Layout ── */
.wrap{max-width:1160px;margin:0 auto;padding:1.35rem 1.25rem 4rem;display:flex;gap:1rem;align-items:flex-start;position:relative;z-index:1;}
.col-main{flex:1 1 0;min-width:0;}
.col-side{width:315px;flex-shrink:0;display:flex;flex-direction:column;gap:10px;}

/* ── Section labels ── */
.sec-label{font-size:10px;letter-spacing:3.6px;text-transform:uppercase;color:var(--muted);font-weight:700;padding:0 2px;margin:1rem 0 6px;font-family:'Staatliches','Oswald',sans-serif;}
.sec-label:first-child{margin-top:0;}

/* ── Schedule rows ── */
.srow{
  display:flex;align-items:center;gap:0;
  background:linear-gradient(180deg,var(--surface),var(--surface-2));
  border:2px solid var(--rule);
  border-radius:0;
  margin-bottom:6px;
  overflow:hidden;
  transition:transform .12s;
}
.srow:hover{transform:translateY(-1px);}
.srow.today-row{box-shadow:inset 0 0 0 2px var(--nasa-blue);}
.srow.past-row{opacity:.7;}
.srow.done-row{opacity:.62;}
.srow.done-row:hover{opacity:.9;cursor:pointer;}
.srow.late-row{background:
  repeating-linear-gradient(-45deg, rgba(252,61,33,.13) 0 10px, rgba(255,214,208,.5) 10px 20px),
  linear-gradient(180deg,var(--surface),var(--surface-2));}
.srow-date{
  min-width:108px;padding:11px 12px;
  border-right:2px solid var(--rule);
  flex-shrink:0;
}
.srow-date-main{font-size:11px;color:var(--muted);font-family:'Space Mono','Courier New',monospace;}
.srow-date-main.ist{color:var(--nasa-blue);font-weight:700;}
.today-chip{display:inline-block;font-size:8px;font-weight:700;letter-spacing:2px;background:var(--nasa-red);color:#fff;padding:2px 6px;border-radius:0;margin-top:4px;font-family:'Staatliches','Oswald',sans-serif;}
.srow-matter{
  min-width:88px;padding:11px 12px;
  border-right:2px solid var(--rule);
  flex-shrink:0;
  font-family:'Space Mono','Courier New',monospace;font-size:12px;font-weight:700;color:var(--ink);
}
.srow-sess{padding:11px 14px;flex:1;display:flex;align-items:center;gap:10px;}
.sess-badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:0;font-size:10px;font-weight:700;white-space:nowrap;letter-spacing:.09em;text-transform:uppercase;border:2px solid #000;font-family:'Staatliches','Oswald',sans-serif;}
.srow-spacer{flex:1;}
.srow-dl{font-size:10px;color:var(--hint);font-family:'Space Mono','Courier New',monospace;white-space:nowrap;padding-right:4px;}
.srow-dl.tight{color:var(--warn);}
.srow-dl.over{color:var(--danger);font-weight:700;}
.srow-hint{font-size:10px;color:var(--hint);font-family:'Space Mono','Courier New',monospace;white-space:nowrap;padding-right:6px;opacity:0;transition:opacity .15s;}
.srow:hover .srow-hint{opacity:1;}
.srow-hint.reopen-hint{color:#924a4a;}

/* ── Checkbox ── */
.chk-wrap{padding:11px 14px;border-left:2px solid var(--rule);flex-shrink:0;}
.chk{
  width:26px;height:26px;border-radius:0;
  border:2px solid #000;background:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;user-select:none;
}
.chk:hover{border-color:var(--nasa-blue);background:#e8f0ff;}
.chk.checked{background:var(--ok);border-color:#000;}
.chk.checked::after{content:'✓';color:#fff;font-size:14px;font-weight:800;}
.chk.disabled{opacity:.22;cursor:not-allowed;border-color:#555;}
.chk.disabled:hover{border-color:#555;background:#fff;}
.chk.missed{border-color:var(--warn);}
.chk.missed:hover{background:#fff4df;border-color:var(--warn);}

/* ── Conflict banner ── */
.conf{background:repeating-linear-gradient(-45deg,#ffe4dd 0 12px,#ffd5cb 12px 24px);border:3px solid #000;border-radius:0;padding:12px 16px;margin-bottom:10px;}
.conf-hdr{font-size:12px;font-weight:700;color:var(--danger);margin-bottom:7px;text-transform:uppercase;letter-spacing:.08em;font-family:'Staatliches','Oswald',sans-serif;}
.conf-item{font-size:11px;color:#442121;line-height:1.7;}
.conf-mn{font-family:'Space Mono','Courier New',monospace;font-weight:700;color:var(--ink);}

/* ── Empty state ── */
.empty-state{background:var(--surface);border:3px solid #000;border-radius:0;padding:40px 20px;text-align:center;color:var(--muted);font-size:13px;}

/* ── Cards ── */
.card,.add-card{background:linear-gradient(180deg,var(--surface),var(--surface-2));border:3px solid #000;border-radius:0;overflow:hidden;}
.card-hdr{padding:10px 14px;border-bottom:2px solid #000;display:flex;justify-content:space-between;align-items:center;}
.card-title{font-size:13px;font-weight:600;}

/* ── App rows ── */
.app-item{padding:10px 14px;border-bottom:2px solid var(--rule2);}
.app-item:last-child{border-bottom:none;}
.app-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.app-mn{font-family:'Space Mono','Courier New',monospace;font-size:13px;font-weight:700;}
.app-rm{background:none;border:none;color:var(--hint);font-size:16px;cursor:pointer;line-height:1;padding:0 2px;}
.app-rm:hover{color:var(--nasa-red);}
.app-meta{font-size:10px;color:var(--muted);line-height:1.65;margin-bottom:6px;}
.prog-cols{display:flex;gap:2px;margin-top:2px;}
.prog-col{flex:1;min-width:0;padding:2px 1px 1px;border-radius:0;transition:background .12s;}
.prog-col-bar{height:4px;border-radius:0;background:#a89e8c;margin-bottom:3px;}
.prog-col-bar.done{background:var(--ok);}
.prog-col-bar.cur{background:var(--nasa-red);}
.prog-col-name{font-size:7.5px;text-align:center;color:var(--hint);text-transform:uppercase;letter-spacing:.4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.prog-col-name.done{color:var(--ok);}
.prog-col-name.cur{color:var(--nasa-red);}
.prog-col.clickable{cursor:pointer;}
.prog-col.clickable:hover{background:#e5dbc6;}
.prog-col.cur.clickable:hover{background:#ffe0da;}
.prog-col.done.clickable:hover{background:#deefdd;}
.apps-empty{padding:20px 14px;text-align:center;color:var(--muted);font-size:13px;}

/* ── Add form ── */
.add-card{padding:14px;}
.add-title{font-size:13px;font-weight:700;margin-bottom:12px;letter-spacing:.08em;text-transform:uppercase;font-family:'Staatliches','Oswald',sans-serif;}
.field{margin-bottom:8px;}
.field label{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:3px;}
.field input{width:100%;background:#fffdf7;border:2px solid #000;border-radius:0;padding:7px 10px;font-size:13px;color:var(--ink);outline:none;font-family:'Oswald','Segoe UI',sans-serif;transition:border-color .15s;}
.field input.mono{font-family:'Space Mono','Courier New',monospace;}
.field input:focus{border-color:var(--nasa-blue);}
.field input::placeholder{color:var(--hint);}
.add-btn{width:100%;background:var(--nasa-red);color:#fff;border:2px solid #000;border-radius:0;padding:9px;font-size:12px;font-weight:700;cursor:pointer;margin-top:4px;transition:filter .15s;letter-spacing:.08em;text-transform:uppercase;font-family:'Staatliches','Oswald',sans-serif;}
.add-btn:hover:not(:disabled){filter:brightness(.93);}
.add-btn:disabled{opacity:.3;cursor:default;}

/* ── OOO panel ── */
.ooo-tog-btn{width:100%;padding:10px 14px;background:var(--tape);border:none;font-family:'Staatliches','Oswald',sans-serif;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#f8f8f8;cursor:pointer;display:flex;justify-content:space-between;align-items:center;text-align:left;}
.ooo-tog-btn:hover{filter:brightness(1.08);}
.ooo-inner{padding:0 12px 12px;border-top:2px solid #000;}
.cal-nav-row{display:flex;justify-content:space-between;align-items:center;padding:10px 2px 8px;}
.cal-nav{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;padding:0 4px;}
.cal-nav:hover{color:var(--nasa-blue);}
.cal-month-lbl{font-size:13px;font-weight:500;}
.cal-hint{font-size:9px;color:var(--hint);text-align:center;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px;}
.cal-dow-row span{text-align:center;font-size:9px;font-family:'Space Mono','Courier New',monospace;color:var(--muted);}
.cal-dow-row span.wknd{color:var(--hint);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-cell{text-align:center;font-size:11px;font-family:'Space Mono','Courier New',monospace;padding:4px 2px;border-radius:0;border:1px solid transparent;color:var(--hint);}
.cal-cell.wt{cursor:pointer;color:var(--ink);}
.cal-cell.wt:hover{background:#e8ddca;}
.cal-cell.is-ooo{background:#f6c2b8;color:#671111;cursor:pointer;}
.cal-cell.is-booked{background:#ccd9f1;color:#123874;}
.cal-cell.is-today-cell{border-color:#000;font-weight:700;}
.cal-legend{display:flex;gap:12px;margin-top:9px;font-size:10px;color:var(--muted);}
.leg-dot{display:inline-block;width:8px;height:8px;border-radius:0;vertical-align:middle;margin-right:3px;}
.ooo-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:10px;color:var(--muted);font-family:'Space Mono','Courier New',monospace;}
.clr-btn{background:none;border:none;color:var(--muted);font-size:10px;cursor:pointer;font-family:'Space Mono','Courier New',monospace;}
.clr-btn:hover{color:var(--nasa-red);}

/* ── Done-today banner ── */
.done-today-bar{background:linear-gradient(180deg,#d7edd8,#c5e2c7);border:3px solid #000;border-radius:0;padding:10px 16px;margin-bottom:4px;font-size:12px;color:#1b4d24;position:relative;}
.done-today-bar::after{content:'APPROVED';position:absolute;right:10px;top:8px;border:2px solid #1b4d24;color:#1b4d24;padding:1px 6px;font-size:10px;letter-spacing:.12em;transform:rotate(-5deg);font-family:'Staatliches','Oswald',sans-serif;}
.done-today-item{display:flex;justify-content:space-between;align-items:center;gap:10px;}
.done-today-item + .done-today-item{margin-top:6px;padding-top:6px;border-top:1px solid rgba(31,92,56,.28);}
.done-today-item strong{font-family:'Space Mono','Courier New',monospace;}
.undo-btn{background:#f7fff7;border:2px solid #1b4d24;border-radius:0;padding:3px 10px;font-size:11px;color:#1b4d24;cursor:pointer;font-family:inherit;}
.undo-btn:hover{background:#e8f9ea;}

@media(max-width:740px){.wrap{flex-direction:column;}.col-side{width:100%;}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <span class="topbar-eyebrow">Tom Sachs Field Lab // NASA</span>
    <span class="topbar-title">Mission Procedures Console</span>
  </div>
  <div class="topbar-stats">
    <div class="tstat"><span class="tstat-l">Today</span><span id="hdr-date" class="tstat-v mono" style="font-size:12px"></span></div>
    <div class="tstat"><span class="tstat-l">Apps</span><span id="hdr-apps" class="tstat-v">0</span></div>
    <div class="tstat"><span class="tstat-l">Left</span><span id="hdr-left" class="tstat-v">0</span></div>
    <div class="tstat"><span class="tstat-l">Mission Risk</span><span id="hdr-oob" class="tstat-v">0</span></div>
  </div>
</div>

<div class="wrap">
  <div class="col-main">
    <div id="conf-wrap"></div>
    <div id="done-today-wrap"></div>
    <div id="schedule"></div>
  </div>
  <div class="col-side">
    <div>
      <div class="sec-label" style="margin-top:0">Mission Manifest</div>
      <div class="card" id="apps-card"></div>
    </div>
    <div class="add-card">
      <div class="add-title">Log New Mission Packet</div>
      <div class="field"><label>Matter Number</label><input type="text" id="inp-m" class="mono" placeholder="1234-123" maxlength="24" oninput="renderAll()" onkeydown="if(event.key==='Enter')addApp()"></div>
      <div class="field"><label>Call Day</label><input type="date" id="inp-c" oninput="renderAll()"></div>
      <div class="field"><label>Deadline</label><input type="date" id="inp-d" oninput="renderAll()"></div>
      <button class="add-btn" id="add-btn" onclick="addApp()" disabled>Add to Manifest</button>
    </div>
    <div class="card">
      <button class="ooo-tog-btn" onclick="toggleOoo()">
        Mission Blackout Days
        <span id="ooo-tog-lbl" style="font-size:10px;color:var(--hint);font-family:'Courier New',monospace">▼ show</span>
      </button>
      <div id="ooo-body" style="display:none">
        <div class="ooo-inner">
          <div class="cal-nav-row">
            <button class="cal-nav" onclick="prevMo()">&#8249;</button>
            <span id="cal-lbl" class="cal-month-lbl"></span>
            <button class="cal-nav" onclick="nextMo()">&#8250;</button>
          </div>
          <div class="cal-hint">Click Mon – Thu to toggle OOO</div>
          <div class="cal-dow-row">
            <span>M</span><span>T</span><span>W</span><span>T</span>
            <span class="wknd">F</span><span class="wknd">S</span><span class="wknd">S</span>
          </div>
          <div id="cal-grid" class="cal-grid"></div>
          <div class="cal-legend">
            <span><span class="leg-dot" style="background:#ddeeff"></span>Scheduled</span>
            <span><span class="leg-dot" style="background:#fde8e8"></span>OOO</span>
          </div>
          <div class="ooo-footer">
            <span id="ooo-ct"></span>
            <button id="clr-ooo-btn" class="clr-btn" onclick="clrOoo()" style="display:none">Clear all</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ── Constants ─────────────────────────────────────────────── */
const SESSIONS=['Claims','Drawings','Write','First Edit','Second Edit','Proof'];
const SESS_S  =['Clms','Draw','Write','1st Ed','2nd Ed','Proof'];
const S_CLR   =['#174f9e','#4e2e9e','#145230','#7a4700','#822a12','#174f2a'];
const S_BG    =['#ddeeff','#ede8ff','#d4f0e0','#fff0cc','#ffeada','#d8f5e2'];

/* ── Utils ──────────────────────────────────────────────────── */
const pad=n=>String(n).padStart(2,'0');
const toStr=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const fromStr=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);};
const TODAY=toStr(new Date());
const isWT=s=>{const dw=fromStr(s).getDay();return dw>=1&&dw<=4;};
const nextDay=s=>{const d=fromStr(s);d.setDate(d.getDate()+1);return toStr(d);};
const daysBetween=(a,b)=>Math.round((fromStr(b)-fromStr(a))/86400000);
const fmtRow=s=>fromStr(s).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
const fmtShort=s=>fromStr(s).toLocaleDateString('en-US',{month:'short',day:'numeric'});

/* ── State ──────────────────────────────────────────────────── */
let apps=JSON.parse(localStorage.getItem('pw4_apps')||'[]');
let clog=JSON.parse(localStorage.getItem('pw4_clog')||'{}');
// clog[appId] = array of {sessIdx, date} objects
let ooo=new Set(JSON.parse(localStorage.getItem('pw4_ooo')||'[]'));
let _id=parseInt(localStorage.getItem('pw4_id')||'0');
let calMo={y:new Date().getFullYear(),m:new Date().getMonth()};
let oooOpen=false;

const uid=()=>{_id++;localStorage.setItem('pw4_id',String(_id));return `a${_id}`;};
const save=()=>{
  localStorage.setItem('pw4_apps',JSON.stringify(apps));
  localStorage.setItem('pw4_clog',JSON.stringify(clog));
  localStorage.setItem('pw4_ooo',JSON.stringify([...ooo]));
};

/* ── Helpers ──────────────────────────────────────────────── */
// How many sessions are done for an app
const doneCt=id=>(clog[id]||[]).length;
// Set of completed session indices for an app
const doneSet=id=>new Set((clog[id]||[]).map(e=>e.sessIdx));
// Lowest session index not yet completed (or SESSIONS.length if all done)
const nextPending=id=>{
  const s=doneSet(id);
  for(let i=0;i<SESSIONS.length;i++)if(!s.has(i))return i;
  return SESSIONS.length;
};
// All sessions completed today, in chronological order across apps
const todayEntries=()=>{
  const out=[];
  for(const a of apps){
    (clog[a.id]||[]).forEach(e=>{if(e.date===TODAY)out.push({app:a,entry:e});});
  }
  return out;
};

/* ── Scheduler ─────────────────────────────────────────────── */
function buildSchedule(startFrom){
  // For each app, list its still-pending sessions in original order
  const queue=apps.map(a=>{
    const s=doneSet(a.id);
    const rem=[];
    for(let i=0;i<SESSIONS.length;i++)if(!s.has(i))rem.push({name:SESSIONS[i],idx:i});
    return{...a,nextIdx:rem.length?rem[0].idx:SESSIONS.length,rem};
  }).filter(q=>q.rem.length>0);

  const sched=[];
  let cur=startFrom,g=0;
  while(queue.some(q=>q.rem.length>0)&&g++<900){
    if(!isWT(cur)||ooo.has(cur)){cur=nextDay(cur);continue;}
    const elig=queue
      .filter(q=>q.rem.length>0&&q.callDay<cur)
      .sort((a,b)=>a.deadline.localeCompare(b.deadline));
    if(elig.length>0){
      const top=elig[0],sess=top.rem.shift();
      sched.push({date:cur,appId:top.id,matter:top.matter,session:sess.name,sessIdx:sess.idx,deadline:top.deadline,onTime:cur<=top.deadline,isNext:sess.idx===top.nextIdx});
    }
    cur=nextDay(cur);
  }
  return sched;
}

/* ── Actions ────────────────────────────────────────────────── */
function markDone(appId,sessIdx){
  if(sessIdx===undefined)sessIdx=nextPending(appId);
  if(sessIdx<0||sessIdx>=SESSIONS.length)return;
  if(!clog[appId])clog[appId]=[];
  if(clog[appId].some(e=>e.sessIdx===sessIdx))return;
  clog[appId].push({sessIdx,date:TODAY});
  save();renderAll();
}

function undoEntry(appId,sessIdx){
  clog[appId]=(clog[appId]||[]).filter(e=>!(e.sessIdx===sessIdx&&e.date===TODAY));
  save();renderAll();
}

function reopenSess(appId,sessIdx){
  const app=apps.find(a=>a.id===appId);
  if(!confirm(`Reopen "${SESSIONS[sessIdx]}" for ${app?.matter}?`))return;
  clog[appId]=(clog[appId]||[]).filter(e=>e.sessIdx!==sessIdx);
  save();renderAll();
}

function addApp(){
  const m=document.getElementById('inp-m').value.trim();
  const c=document.getElementById('inp-c').value;
  const d=document.getElementById('inp-d').value;
  if(!m||!c||!d)return;
  if(d<=c){alert('Deadline must be after call day.');return;}
  if(apps.find(a=>a.matter===m)&&!confirm(`Matter ${m} already exists. Add anyway?`))return;
  apps.push({id:uid(),matter:m,callDay:c,deadline:d});
  document.getElementById('inp-m').value='';
  document.getElementById('inp-c').value='';
  document.getElementById('inp-d').value='';
  save();renderAll();
}

function removeApp(id){
  if(!confirm('Remove this application and its completion history?'))return;
  apps=apps.filter(a=>a.id!==id);delete clog[id];save();renderAll();
}

function toggleOoo(){
  oooOpen=!oooOpen;
  document.getElementById('ooo-body').style.display=oooOpen?'block':'none';
  document.getElementById('ooo-tog-lbl').textContent=oooOpen?'▲ hide':'▼ show';
  if(oooOpen)renderAll();
}
function prevMo(){const d=new Date(calMo.y,calMo.m-1);calMo={y:d.getFullYear(),m:d.getMonth()};renderAll();}
function nextMo(){const d=new Date(calMo.y,calMo.m+1);calMo={y:d.getFullYear(),m:d.getMonth()};renderAll();}
function togOoo(ds){ooo.has(ds)?ooo.delete(ds):ooo.add(ds);save();renderAll();}
function clrOoo(){ooo=new Set();save();renderAll();}

/* ── Render ─────────────────────────────────────────────────── */
function renderAll(){
  const todayList=todayEntries();
  const sched=buildSchedule(TODAY);
  const bookedDates=new Set(sched.map(s=>s.date));
  const conflicts=sched.filter(s=>!s.onTime);
  const conflictMatters=[...new Set(conflicts.map(c=>c.matter))];
  const totalDone=apps.reduce((s,a)=>s+doneCt(a.id),0);
  const totalLeft=apps.length*SESSIONS.length-totalDone;

  /* Header */
  document.getElementById('hdr-date').textContent=fmtRow(TODAY);
  document.getElementById('hdr-apps').textContent=apps.length;
  document.getElementById('hdr-left').textContent=totalLeft;
  const oobEl=document.getElementById('hdr-oob');
  oobEl.textContent=conflictMatters.length;
  oobEl.className='tstat-v'+(conflictMatters.length>0?' alarm':'');

  /* Conflict banner */
  let confHTML='';
  if(conflictMatters.length>0){
    const byM={};
    conflicts.forEach(c=>{if(!byM[c.matter])byM[c.matter]={matter:c.matter,deadline:c.deadline,sessions:[]};byM[c.matter].sessions.push(c.session);});
    confHTML='<div class="conf"><div class="conf-hdr">&#9888; Mission Risk &mdash; '+conflictMatters.length+' application'+(conflictMatters.length!==1?'s cannot':'  cannot')+' meet their deadline</div>'+
      Object.values(byM).map(x=>'<div class="conf-item"><span class="conf-mn">'+x.matter+'</span> &mdash; '+x.sessions.length+' session'+(x.sessions.length!==1?'s':'')+' fall past deadline of <strong>'+fmtShort(x.deadline)+'</strong>: '+x.sessions.join(', ')+'.</div>').join('')+
      '</div>';
  }
  document.getElementById('conf-wrap').innerHTML=confHTML;

  /* Done-today bar */
  let dtHTML='';
  if(todayList.length){
    dtHTML='<div class="done-today-bar">'+todayList.map(te=>
      '<div class="done-today-item"><span>&#10003; <strong>'+te.app.matter+'</strong> &mdash; '+SESSIONS[te.entry.sessIdx]+' completed today</span>'+
      '<button class="undo-btn" onclick="undoEntry(\''+te.app.id+'\','+te.entry.sessIdx+')">Undo</button></div>'
    ).join('')+'</div>';
  }
  document.getElementById('done-today-wrap').innerHTML=dtHTML;

  /* ── Schedule ── */
  if(!apps.length){
    document.getElementById('schedule').innerHTML='<div class="empty-state">Add an application to get started.</div>';
    renderSide(totalDone,bookedDates);
    return;
  }

  // Collect past completions (sorted by date then sessIdx)
  const pastRows=[];
  for(const app of apps){
    (clog[app.id]||[]).forEach(e=>{
      pastRows.push({date:e.date,appId:app.id,matter:app.matter,session:SESSIONS[e.sessIdx],sessIdx:e.sessIdx,deadline:app.deadline,done:true});
    });
  }
  pastRows.sort((a,b)=>a.date!==b.date?a.date.localeCompare(b.date):a.sessIdx-b.sessIdx);
  const recentPast=pastRows.slice(-8);

  // Future rows: cap at 36
  const futureRows=sched.slice(0,36);

  // Build HTML
  let html='';

  // Past section
  if(recentPast.length>0){
    html+='<div class="sec-label">Recent completions</div>';
    recentPast.forEach(row=>{
      const si=row.sessIdx;
      html+='<div class="srow done-row" onclick="reopenSess(\''+row.appId+'\','+si+')" title="Click to reopen this session">'+
        '<div class="srow-date"><div class="srow-date-main">'+fmtRow(row.date)+'</div></div>'+
        '<div class="srow-matter">'+row.matter+'</div>'+
        '<div class="srow-sess"><span class="sess-badge" style="background:'+S_BG[si]+';color:'+S_CLR[si]+'">'+row.session+'</span>'+
        '<span class="srow-spacer"></span>'+
        '<span class="srow-hint reopen-hint">&#8635; reopen</span></div>'+
        '<div class="chk-wrap"><div class="chk checked"></div></div>'+
        '</div>';
    });
  }

  // Upcoming section
  html+='<div class="sec-label">'+(recentPast.length?'Upcoming sessions':'Sessions')+'</div>';

  if(futureRows.length===0){
    html+='<div class="empty-state" style="margin-top:4px">All sessions complete &mdash; great work.</div>';
  } else {
    futureRows.forEach(row=>{
      const si=row.sessIdx;
      const isToday=row.date===TODAY;
      const isPast=row.date<TODAY;

      // The schedule is a linear view: only the next-scheduled session for each
      // matter is checkable here. Out-of-order completion is available in the
      // Applications list.
      const isNext=row.isNext;
      let chkCls='chk';
      let chkClick='';
      let chkTitle='';
      if(isNext){
        chkClick='onclick="markDone(\''+row.appId+'\','+row.sessIdx+')"';
        chkTitle='title="Mark complete"';
      } else if(isPast){
        chkCls='chk missed';
        chkTitle='title="Earlier scheduled session for this matter still pending"';
      } else {
        chkCls='chk disabled';
        chkTitle='title="Mark out of order from the Applications list if needed"';
      }

      const dLeft=daysBetween(TODAY,row.deadline);
      const dlCls=!row.onTime?'over':dLeft<=5?'tight':'';
      const dlText=!row.onTime?fmtShort(row.deadline)+' &#9888;':'due '+fmtShort(row.deadline);
      const hintText=isNext?'<span class="srow-hint">&#10003; mark done</span>':'';

      const rowCls='srow'+(isToday?' today-row':isPast?' past-row':'')+(row.onTime?'':' late-row');
      html+='<div class="'+rowCls+'">'+
        '<div class="srow-date">'+
        '<div class="srow-date-main'+(isToday?' ist':'')+'">'+fmtRow(row.date)+'</div>'+
        (isToday?'<div class="today-chip">TODAY</div>':'')+
        '</div>'+
        '<div class="srow-matter">'+row.matter+'</div>'+
        '<div class="srow-sess">'+
        '<span class="sess-badge" style="background:'+S_BG[si]+';color:'+S_CLR[si]+'">'+row.session+'</span>'+
        '<span class="srow-spacer"></span>'+
        hintText+
        '<span class="srow-dl '+dlCls+'">'+dlText+'</span>'+
        '</div>'+
        '<div class="chk-wrap"><div class="'+chkCls+'" '+chkClick+' '+chkTitle+'></div></div>'+
        '</div>';
    });
    if(sched.length>36)html+='<div style="text-align:center;padding:14px 0;font-size:10px;color:var(--hint);font-family:\'Courier New\',monospace;letter-spacing:1px">... and '+(sched.length-36)+' more session'+(sched.length-36!==1?'s':'')+' beyond this window</div>';
  }

  document.getElementById('schedule').innerHTML=html;
  renderSide(totalDone,bookedDates);
}

function renderSide(totalDone,bookedDates){
  /* Apps list */
  let appsHTML='';
  if(!apps.length){
    appsHTML='<div class="apps-empty">No applications yet.</div>';
  } else {
    appsHTML=[...apps].sort((a,b)=>a.deadline.localeCompare(b.deadline)).map(a=>{
      const done=doneCt(a.id),isComplete=done>=SESSIONS.length;
      const doneS=doneSet(a.id);
      const nextP=nextPending(a.id);
      const dLeft=daysBetween(TODAY,a.deadline);
      const dlStr=isComplete?'Complete':dLeft>=0?dLeft+'d to deadline':Math.abs(dLeft)+'d overdue';
      const dlC=isComplete?'var(--green)':dLeft<0?'var(--red)':dLeft<=5?'var(--amber)':'var(--muted)';
      const progHTML=SESSIONS.map((_,i)=>{
        const isDone=doneS.has(i);
        const isCur=!isDone&&i===nextP;
        const stateCls=(isDone?' done':isCur?' cur':'');
        let click,title;
        if(isDone){
          click=' onclick="reopenSess(\''+a.id+'\','+i+')"';
          title=' title="Reopen '+SESSIONS[i]+'"';
        } else {
          click=' onclick="markDone(\''+a.id+'\','+i+')"';
          title=' title="Mark '+SESSIONS[i]+' complete"';
        }
        return '<div class="prog-col clickable'+stateCls+'"'+click+title+'>'+
          '<div class="prog-col-bar'+stateCls+'"></div>'+
          '<div class="prog-col-name'+stateCls+'">'+SESS_S[i]+'</div>'+
          '</div>';
      }).join('');
      return '<div class="app-item">'+
        '<div class="app-top"><div class="app-mn">'+a.matter+'</div><button class="app-rm" onclick="removeApp(\''+a.id+'\')">&times;</button></div>'+
        '<div class="app-meta">Call: '+fmtShort(a.callDay)+' &middot; Deadline: '+fmtShort(a.deadline)+'<br><span style="color:'+dlC+'">'+dlStr+'</span></div>'+
        '<div class="prog-cols">'+progHTML+'</div>'+
        '</div>';
    }).join('');
  }
  document.getElementById('apps-card').innerHTML=appsHTML;

  /* Add button */
  const m=document.getElementById('inp-m').value.trim();
  const c=document.getElementById('inp-c').value;
  const d=document.getElementById('inp-d').value;
  document.getElementById('add-btn').disabled=!(m&&c&&d);

  /* OOO calendar (only if open) */
  const togLbl=document.getElementById('ooo-tog-lbl');
  togLbl.textContent=oooOpen?'▲ hide':(ooo.size?'▼ '+ooo.size+' blocked':'▼ show');

  if(!oooOpen)return;
  const cd=new Date(calMo.y,calMo.m,1);
  document.getElementById('cal-lbl').textContent=cd.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const fw=cd.getDay(),off=fw===0?6:fw-1,dim=new Date(calMo.y,calMo.m+1,0).getDate();
  const cells=[...Array(off).fill(null),...Array.from({length:dim},(_,k)=>k+1)];
  document.getElementById('cal-grid').innerHTML=cells.map((day,i)=>{
    if(!day)return'<div></div>';
    const col=i%7,ds=toStr(new Date(calMo.y,calMo.m,day));
    const wt=col<4,iO=ooo.has(ds),iT=ds===TODAY,iB=bookedDates.has(ds)&&!iO;
    const cls=['cal-cell'];
    if(col>=4)cls.push('');
    else if(iO)cls.push('is-ooo');
    else if(iB)cls.push('is-booked');
    else if(wt)cls.push('wt');
    if(iT)cls.push('is-today-cell');
    return'<div class="'+cls.filter(Boolean).join(' ')+'" '+(wt?'onclick="togOoo(\''+ds+'\')"':'')+'>'+day+'</div>';
  }).join('');
  document.getElementById('ooo-ct').textContent=ooo.size?ooo.size+' day'+(ooo.size!==1?'s':'')+' blocked':'No OOO days set';
  document.getElementById('clr-ooo-btn').style.display=ooo.size?'':'none';
}

renderAll();
</script>
</body>
</html>
